# A utiliser sur le serveur : docker compose -f docker-compose.prod.yml up -d
# Watchtower met a jour l'app automatiquement a chaque nouvelle image sur GHCR.

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:

  app:
    image: ghcr.io/logan-gaillard/cesizen-copy:main
    container_name: cesizen-app
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    networks:
      - cesizen-internal

  db:
    image: postgres:16-alpine
    container_name: cesizen-db
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - cesizen_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - cesizen-internal

  # containrrr/watchtower est archive et incompatible avec les Docker Engine
  # recents (client API trop ancien) ; fork maintenu utilise a la place.
  watchtower:
    image: ghcr.io/nicholas-fedor/watchtower:latest
    container_name: cesizen-watchtower
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_POLL_INTERVAL: "300"
    networks:
      - cesizen-internal

networks:
  cesizen-internal:
    driver: bridge

volumes:
  cesizen_data:
    driver: local
